# External link checker configuration (https://lychee.cli.rs).
# Run locally with: lychee --root-dir "$PWD" '**/*.mdx'
# Internal links are resolved against the checkout via --root-dir and then
# skipped by the scheme filter below; `mint broken-links` checks those
# (redirect-aware). This config only validates external http(s) links.

cache = true
max_cache_age = "1d"
scheme = ["http", "https"]

# Skip localhost and private IP ranges (used in self-hosting examples).
exclude_all_private = true

# Resolve internal links against local .mdx files so they parse cleanly.
fallback_extensions = ["mdx"]

# 403: npmjs.com, dev.mysql.com, and others block CI requests.
# 429: rate limiting is not a broken link.
accept = ["100..=103", "200..=299", "403", "429"]

# Placeholder hostnames used in configuration examples.
exclude = ["://your-"]

timeout = 30
