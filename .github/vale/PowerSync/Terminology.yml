# Enforces the terminology table in .claude/CLAUDE.md.
# vocab: false is required. The spelling vocabularies accept 'PostgreSQL' and
# 'replication', and vocabulary terms are exceptions to substitution rules by
# default, which would silently disable these swaps.
extends: substitution
message: "Use '%s' instead of '%s'."
level: error
ignorecase: true
vocab: false
swap:
  # Swapping the Microsoft product name to itself suppresses it: longer keys
  # match first, and matches identical to their replacement are not flagged.
  'Azure Database for PostgreSQL': Azure Database for PostgreSQL
  'synchroni[sz]ation': sync
  # The lookbehind skips URLs (postgresql.org, docs/postgresql) that Vale's
  # scope ignores miss inside indented MDX components.
  '(?<![./])PostgreSQL': Postgres
  'dynamic partial replication': partial sync
