name: Check Documentation

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

jobs:
  check:
    name: Check Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # This checks internal links, but does not validate external links
      - name: Check for broken links
        run: pnpm check:links

  external-links:
    name: Check External Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      # Configuration lives in lychee.toml
      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --root-dir "$PWD" '**/*.mdx'
        env:
          # Raises the rate limit for the many github.com links
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
